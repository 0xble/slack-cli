[tools]
go = "1.25.6"
golangci-lint = "2.8.0"
svu = "3.3.0"

[tasks.build]
description = "Build the binary"
run = """
VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
go build -ldflags "-X main.version=$VERSION" -o slack-cli .
"""

[tasks.install]
description = "Build and install to GOBIN (or GOPATH/bin)"
run = """
VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
BIN_DIR=$(go env GOBIN)
if [ -z "$BIN_DIR" ]; then
  BIN_DIR="$(go env GOPATH)/bin"
fi
mkdir -p "$BIN_DIR"
go build -ldflags "-X main.version=$VERSION" -o "$BIN_DIR/slack-cli" .
echo "Installed to $BIN_DIR/slack-cli"
"""

[tasks."install:global"]
description = "Build and install to ~/bin"
run = """
VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
mkdir -p "$HOME/bin"
go build -ldflags "-X main.version=$VERSION" -o "$HOME/bin/slack-cli" .
echo "Installed to $HOME/bin/slack-cli"
"""

[tasks.test]
description = "Run tests"
run = "go test -v ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.clean]
description = "Clean build artifacts"
run = """
rm -f slack-cli
rm -rf dist/
"""

[tasks.check]
description = "Run all checks (build, test, lint)"
depends = ["build", "test", "lint"]

[tasks.release]
description = "Tag the next version and push to trigger a release"
depends = ["check"]
run = """
NEXT=$(svu next)
CURRENT=$(svu current)
if [ "$NEXT" = "$CURRENT" ]; then
  echo "No version bump detected (current: $CURRENT). Use conventional commits (feat:, fix:, etc.)."
  exit 1
fi
echo "Releasing $CURRENT -> $NEXT"
git tag "$NEXT"
git push origin "$NEXT"
echo "Tagged and pushed $NEXT — release workflow will run on GitHub."
"""

[tasks.install-skill]
description = "Install the Amp skill globally"
run = """
mkdir -p ~/.config/agents/skills/slack
cp skills/slack/SKILL.md ~/.config/agents/skills/slack/SKILL.md
echo "Installed skill to ~/.config/agents/skills/slack/"
"""
